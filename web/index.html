<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kaine Command Center</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <canvas id="field" aria-hidden="true"></canvas>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">K</div>
          <div>
            <h1>Kaine</h1>
            <p id="subtitle">Local core starting</p>
          </div>
        </div>
        <div class="status-strip" aria-label="Kaine status">
          <span class="status-dot" id="statusDot"></span>
          <span id="connectionLabel">Checking core</span>
          <span id="clockLabel">--:--</span>
        </div>
      </header>

      <main class="workspace">
        <section class="identity" aria-label="Kaine identity">
          <div class="core-wrap">
            <div class="kaine-core" id="kaineCore" aria-hidden="true">
              <span class="ring ring-a"></span>
              <span class="ring ring-b"></span>
              <span class="ring ring-c"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="mouth"><i></i><i></i><i></i><i></i><i></i></span>
              <span class="scan scan-a"></span>
              <span class="scan scan-b"></span>
            </div>
          </div>

          <div class="mode-bank" role="group" aria-label="Assistant mode">
            <button class="mode active" data-mode="Operator">Operator</button>
            <button class="mode" data-mode="Engineer">Engineer</button>
            <button class="mode" data-mode="Security">Security</button>
            <button class="mode" data-mode="Strategy">Strategy</button>
            <button class="mode" data-mode="Creative">Creative</button>
          </div>

          <dl class="telemetry">
            <div>
              <dt>Core</dt>
              <dd id="coreMetric">Standby</dd>
            </div>
            <div>
              <dt>Memory</dt>
              <dd id="memoryMetric">0</dd>
            </div>
            <div>
              <dt>Missions</dt>
              <dd id="missionMetric">0</dd>
            </div>
            <div>
              <dt>Policy</dt>
              <dd id="policyMetric">Locked</dd>
            </div>
          </dl>
        </section>

        <section class="conversation" aria-label="Conversation">
          <div class="section-head">
            <div>
              <h2>Command Stream</h2>
              <p id="modeLabel">Operator mode</p>
            </div>
            <div class="voice-controls" aria-label="Voice controls">
              <button class="icon-button" id="listenButton" title="Start voice input" aria-label="Start voice input">
                <span class="icon icon-mic" aria-hidden="true"></span>
              </button>
              <label class="switch" title="Toggle spoken replies">
                <input id="speakToggle" type="checkbox" checked />
                <span></span>
                <b>Voice</b>
              </label>
            </div>
          </div>

          <div class="transcript" id="transcript" aria-live="polite"></div>

          <form class="composer" id="composer">
            <label class="sr-only" for="promptInput">Message Kaine</label>
            <textarea id="promptInput" name="prompt" rows="3" maxlength="4000" placeholder="Directive"></textarea>
            <button class="send-button" type="submit" title="Send directive" aria-label="Send directive">
              <span class="icon icon-send" aria-hidden="true"></span>
            </button>
          </form>

          <div class="quickbar" aria-label="Quick directives">
            <button data-prompt="status">Status</button>
            <button data-prompt="security posture">Security</button>
            <button data-prompt="mission: expand Kaine into a permissioned desktop assistant">Mission</button>
            <button data-prompt="remember that Kaine should stay useful without API keys">Remember</button>
          </div>
        </section>

        <aside class="side-rail" aria-label="Kaine data">
          <section class="rail-section">
            <div class="section-head compact">
              <h2>Missions</h2>
              <button id="missionButton" title="Create mission" aria-label="Create mission">
                <span class="icon icon-plus" aria-hidden="true"></span>
              </button>
            </div>
            <div class="stack-list" id="missionList"></div>
          </section>

          <section class="rail-section">
            <div class="section-head compact">
              <h2>Memory</h2>
              <button id="memoryButton" title="Save current input as memory" aria-label="Save current input as memory">
                <span class="icon icon-save" aria-hidden="true"></span>
              </button>
            </div>
            <div class="stack-list" id="memoryList"></div>
          </section>

          <section class="rail-section diagnostics">
            <h2>Diagnostics</h2>
            <div id="diagnostics"></div>
          </section>
        </aside>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
